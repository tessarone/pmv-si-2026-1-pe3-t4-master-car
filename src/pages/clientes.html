<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MasterCar — Clientes</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/clientes.css">
</head>
<body>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-text">MC</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Operações</span>
      <button class="nav-item" onclick="navigate('dashboard')"><span>Dashboard</span></button>
      <button class="nav-item" onclick="navigate('reservas')"><span>Reservas</span></button>
      <button class="nav-item" onclick="navigate('veiculos')"><span>Veículos</span></button>
      <button class="nav-item active"><span>Clientes</span></button>
      <span class="nav-section-label" style="margin-top:12px;">Administração</span>
      <button class="nav-item" onclick="navigate('users')"><span>Usuários</span></button>
      <button class="nav-item" onclick="showToast('Em breve', 'info')"><span>Configurações</span></button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700;">JA</div>
        <button class="btn-logout" onclick="navigate('login')" title="Sair">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><nav class="breadcrumb"><span class="breadcrumb-item">Clientes</span></nav></div>
      <div class="topbar-right">
        <button class="topbar-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></button>
        <div class="topbar-divider"></div>
        <button class="topbar-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
      </div>
    </header>

    <div class="page page-container">
      <div class="page-header page-header-row">
        <div>
          <h1 style="font-family:var(--font-display);font-size:2.2rem;letter-spacing:.1em;text-transform:uppercase;color:var(--white);">Clientes</h1>
          <p style="margin-top:6px;font-size:.875rem;color:var(--gray-500);">Gerencie os clientes da sua locadora</p>
        </div>
        <button class="btn btn-primary" onclick="openNovoCliente()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
          Novo Cliente
        </button>
      </div>

      <!-- Stats -->
      <div class="cli-stats">
        <div class="cli-stat">
          <div class="cli-stat-val" id="statTotal">—</div>
          <div class="cli-stat-label">Total de Clientes</div>
        </div>
        <div class="cli-stat">
          <div class="cli-stat-val" id="statAtivos">—</div>
          <div class="cli-stat-label">Clientes Ativos</div>
        </div>
        <div class="cli-stat">
          <div class="cli-stat-val" id="statInativos">—</div>
          <div class="cli-stat-label">Clientes Inativos</div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="users-toolbar">
        <div class="search-wrap">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="search" class="search-input" placeholder="Buscar por nome, e-mail ou CPF..." id="searchClientes">
        </div>
        <select class="filter-select" id="filterStatusCliente">
          <option value="">Todos os status</option>
          <option value="ativo">Ativos</option>
          <option value="inativo">Inativos</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="users-table-card">
        <table class="users-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>CPF</th>
              <th>Telefone</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="clientesTableBody">
            <tr><td colspan="5" style="text-align:center;color:var(--gray-600);padding:24px;">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: NOVO / EDITAR CLIENTE -->
<div class="modal-overlay" id="clienteModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 class="modal-title">Novo Cliente</h2>
        <p style="font-size:.78rem;color:var(--gray-600);margin-top:3px;">Preencha os dados do cliente</p>
      </div>
      <button class="modal-close" onclick="closeModal('clienteModal')">&times;</button>
    </div>
    <form onsubmit="handleSaveCliente(event)">
      <div class="modal-body">
        <div class="field-group">
          <label>Nome Completo</label>
          <input type="text" id="c_nome" class="field-input" placeholder="Ex: João Silva" required>
        </div>
        <div class="modal-row">
          <div class="field-group">
            <label>E-mail</label>
            <input type="email" id="c_email" class="field-input" placeholder="joao@email.com" required>
          </div>
          <div class="field-group">
            <label>Telefone</label>
            <input type="tel" id="c_telefone" class="field-input" placeholder="(31) 99999-0000">
          </div>
        </div>
        <div class="modal-row">
          <div class="field-group">
            <label>CPF</label>
            <input type="text" id="c_cpf" class="field-input" placeholder="000.000.000-00">
          </div>
          <div class="field-group">
            <label>Status</label>
            <select id="c_status" class="field-input">
              <option value="ativo">Ativo</option>
              <option value="inativo">Inativo</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('clienteModal')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Cliente</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  function openNovoCliente() {
    const modal = document.getElementById('clienteModal');
    delete modal.dataset.editId;
    document.querySelector('#clienteModal .modal-title').textContent = 'Novo Cliente';
    document.querySelector('#clienteModal form').reset();
    openModal('clienteModal');
  }

  function updateClienteStats() {
    const clientes = getClientes();
    document.getElementById('statTotal').textContent    = clientes.length;
    document.getElementById('statAtivos').textContent   = clientes.filter(c => c.status === 'ativo').length;
    document.getElementById('statInativos').textContent = clientes.filter(c => c.status === 'inativo').length;
  }

  document.addEventListener('DOMContentLoaded', () => {
    initAllData();
    renderClientesTable();
    updateClienteStats();
    document.getElementById('searchClientes').addEventListener('input', function() {
      const statusFilter = document.getElementById('filterStatusCliente').value;
      let clientes = getClientes();
      const f = this.value.toLowerCase();
      if (f) clientes = clientes.filter(c => c.nome.toLowerCase().includes(f) || c.email.toLowerCase().includes(f) || (c.cpf && c.cpf.includes(f)));
      if (statusFilter) clientes = clientes.filter(c => c.status === statusFilter);
      renderFiltered(clientes);
    });
    document.getElementById('filterStatusCliente').addEventListener('change', function() {
      const f = document.getElementById('searchClientes').value.toLowerCase();
      let clientes = getClientes();
      if (f) clientes = clientes.filter(c => c.nome.toLowerCase().includes(f) || c.email.toLowerCase().includes(f) || (c.cpf && c.cpf.includes(f)));
      if (this.value) clientes = clientes.filter(c => c.status === this.value);
      renderFiltered(clientes);
    });
  });

  function renderFiltered(clientes) {
    const tbody = document.getElementById('clientesTableBody');
    if (!clientes.length) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--gray-600);padding:24px;">Nenhum cliente encontrado</td></tr>'; return; }
    tbody.innerHTML = clientes.map(c => {
      const initials = c.nome.split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase();
      const badgeClass = c.status === 'ativo' ? 'badge-green' : 'badge-yellow';
      const badgeLabel = c.status === 'ativo' ? 'Ativo' : 'Inativo';
      return `<tr>
        <td><div class="user-cell"><div class="user-cell-avatar">${initials}</div><div><div class="user-cell-name">${c.nome}</div><div class="user-cell-email">${c.email}</div></div></div></td>
        <td style="color:var(--gray-300);font-size:.82rem;">${c.cpf}</td>
        <td style="color:var(--gray-300);font-size:.82rem;">${c.telefone}</td>
        <td><span class="badge ${badgeClass}">${badgeLabel}</span></td>
        <td><div class="actions-cell">
          <button class="action-btn" onclick="openEditCliente(${c.id})"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
          <button class="action-btn delete" onclick="removeCliente(${c.id})"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
        </div></td>
      </tr>`;
    }).join('');
  }
</script>
</body>
</html>
