<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MasterCar — Login</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="login-page">

  <!-- LEFT: BRAND -->
  <div class="login-brand">
    <div class="brand-logo-wrap">
      <img src="../assets/logo.jpg" alt="MasterCar Logo">
    </div>
    <div class="brand-tagline">
      <h2>MasterCar</h2>
      <p>Sistema de Gestão de Locadoras</p>
    </div>
    <div class="brand-divider">
      <span></span>
      <p>Gestão inteligente da sua frota</p>
      <span></span>
    </div>
  </div>

  <!-- RIGHT: FORM -->
  <div class="login-form-panel">

    <div class="login-form-header">
      <h1>Acesso</h1>
      <p>Entre com suas credenciais para continuar</p>
    </div>

    <form class="login-form" onsubmit="handleLogin(event)">

      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <input
            type="email"
            id="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
            required
          >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-wrap">
          <input type="checkbox" name="remember">
          Lembrar acesso
        </label>
        <a href="#" class="forgot-link">Esqueci a senha</a>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        Entrar
      </button>

    </form>

    <div class="login-footer">
      <p>MasterCar &copy; 2026</p>
    </div>

  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    const isVisible = input.type === 'text';
    input.type = isVisible ? 'password' : 'text';
    icon.innerHTML = isVisible
      ? `<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`
      : `<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Verificando...';
    btn.disabled = true;
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 800);
  }
</script>

</body>
</html>
