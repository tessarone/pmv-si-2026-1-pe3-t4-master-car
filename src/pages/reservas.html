<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MasterCar — Reservas</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/reservas.css">
</head>
<body>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-text">MC</span>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Operações</span>
      <button class="nav-item" onclick="navigate('dashboard')"><span>Dashboard</span></button>
      <button class="nav-item active"><span>Reservas</span></button>
      <button class="nav-item" onclick="navigate('veiculos')"><span>Veículos</span></button>
      <button class="nav-item" onclick="navigate('clientes')"><span>Clientes</span></button>
      <span class="nav-section-label" style="margin-top:12px;">Administração</span>
      <button class="nav-item" onclick="navigate('users')"><span>Usuários</span></button>
      <button class="nav-item" onclick="showToast('Em breve', 'info')"><span>Configurações</span></button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.75rem;font-weight:700;">JA</div>
        <button class="btn-logout" onclick="navigate('login')" title="Sair">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left"><nav class="breadcrumb"><span class="breadcrumb-item">Reservas</span></nav></div>
      <div class="topbar-right">
        <button class="topbar-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg></button>
        <div class="topbar-divider"></div>
        <button class="topbar-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
      </div>
    </header>

    <div class="page page-container">
      <div class="page-header page-header-row">
        <div>
          <h1 style="font-family:var(--font-display);font-size:2.2rem;letter-spacing:.1em;text-transform:uppercase;color:var(--white);">Reservas</h1>
          <p style="margin-top:6px;font-size:.875rem;color:var(--gray-500);">Gerencie as locações da sua frota</p>
        </div>
        <button class="btn btn-primary" onclick="openNovaReserva()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
          Nova Reserva
        </button>
      </div>

      <!-- KPIs -->
      <div class="res-kpi-row">
        <div class="res-kpi">
          <div class="res-kpi-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
          <div><div class="res-kpi-val" id="kpiAtivas">—</div><div class="res-kpi-label">Ativas</div></div>
        </div>
        <div class="res-kpi">
          <div class="res-kpi-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
          <div><div class="res-kpi-val" id="kpiPendentes">—</div><div class="res-kpi-label">Pendentes</div></div>
        </div>
        <div class="res-kpi">
          <div class="res-kpi-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M5 13l4 4L19 7"/></svg></div>
          <div><div class="res-kpi-val" id="kpiEncerradas">—</div><div class="res-kpi-label">Encerradas</div></div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="users-toolbar">
        <div class="search-wrap">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="search" class="search-input" placeholder="Buscar cliente, veículo ou placa..." id="searchReservas">
        </div>
        <select class="filter-select" id="filterStatus">
          <option value="">Todos os status</option>
          <option value="ativa">Ativas</option>
          <option value="pendente">Pendentes</option>
          <option value="encerrada">Encerradas</option>
        </select>
      </div>

      <!-- TABLE -->
      <div class="users-table-card">
        <table class="users-table">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Veículo / Placa</th>
              <th>Início</th>
              <th>Término</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="reservasTableBody">
            <tr><td colspan="6" style="text-align:center;color:var(--gray-600);padding:24px;">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: NOVA / EDITAR RESERVA -->
<div class="modal-overlay" id="reservaModal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2 class="modal-title">Nova Reserva</h2>
        <p class="modal-subtitle">Preencha os dados da locação</p>
      </div>
      <button class="modal-close" onclick="closeModal('reservaModal')">&times;</button>
    </div>
    <form onsubmit="handleSaveReserva(event)">
      <div class="modal-body">

        <div class="field-group">
          <label>Cliente</label>
          <select id="r_cliente_sel" class="field-input">
            <option value="">Selecionar cliente cadastrado</option>
          </select>
        </div>
        <!-- hidden fields populated by select or edits -->
        <input type="hidden" id="r_cliente">
        <input type="hidden" id="r_email">

        <div class="field-group">
          <label>Veículo</label>
          <select id="r_veiculo" class="field-input" required>
            <option value="">Selecionar veículo</option>
          </select>
        </div>

        <div class="field-group">
          <label>Placa</label>
          <input type="text" id="r_placa" class="field-input" placeholder="Preenchido automaticamente" readonly style="color:var(--gray-600);">
        </div>

        <div class="modal-row">
          <div class="field-group">
            <label>Data de Início</label>
            <input type="date" id="r_inicio" class="field-input" required>
          </div>
          <div class="field-group">
            <label>Data de Término</label>
            <input type="date" id="r_fim" class="field-input" required>
          </div>
        </div>

        <div class="modal-row">
          <div class="field-group">
            <label>Status</label>
            <select id="r_status" class="field-input">
              <option value="pendente">Pendente</option>
              <option value="ativa">Ativa</option>
              <option value="encerrada">Encerrada</option>
            </select>
          </div>
          <div class="field-group">
            <label>Valor Total (R$)</label>
            <input type="number" id="r_valor" class="field-input" placeholder="0.00" step="0.01" min="0">
          </div>
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('reservaModal')">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Reserva</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  function openNovaReserva() {
    const modal = document.getElementById('reservaModal');
    delete modal.dataset.editId;
    document.querySelector('#reservaModal .modal-title').textContent = 'Nova Reserva';
    document.querySelector('#reservaModal form').reset();
    populateVeiculoSelect();
    populateClienteSelect();
    openModal('reservaModal');
  }

  function updateReservaKPIs() {
    const reservas = getReservas();
    document.getElementById('kpiAtivas').textContent    = reservas.filter(r => r.status === 'ativa').length;
    document.getElementById('kpiPendentes').textContent = reservas.filter(r => r.status === 'pendente').length;
    document.getElementById('kpiEncerradas').textContent= reservas.filter(r => r.status === 'encerrada').length;
  }

  document.addEventListener('DOMContentLoaded', () => {
    initAllData();       // seed if first visit
    syncVeiculoStatus(); // keep vehicles consistent
    renderReservasTable();
    updateReservaKPIs();
    document.getElementById('searchReservas').addEventListener('input', function() {
      renderReservasTable(this.value, document.getElementById('filterStatus').value);
    });
    document.getElementById('filterStatus').addEventListener('change', function() {
      renderReservasTable(document.getElementById('searchReservas').value, this.value);
    });
  });
</script>
</body>
</html>
